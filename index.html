<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Claude Code Transcript Viewer</title>
		<meta name="description" content="View Claude Code transcript JSONL files in a readable conversation format." />
		<link rel="stylesheet" href="https://fonts.bunny.net/css?family=geist:400,500,600|geist-mono:400,500" />
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<header id="viewer" class="viewer-header" hidden>
			<div class="header-titles">
				<span id="header-file" class="header-file"></span>
				<span id="header-meta" class="header-meta"></span>
			</div>
			<button id="close-btn" type="button" class="close-btn" aria-label="Close transcript">×</button>
		</header>

		<main class="layout">
			<div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Choose or drop a Claude Code transcript .jsonl file">
				<div class="dropzone-icon">⤓</div>
				<div class="dropzone-title">Drop a Claude Code transcript here</div>
				<div class="dropzone-subtitle">
					or <span class="dropzone-link">click to choose a .jsonl file</span>
				</div>
				<div class="dropzone-hint">
					Transcripts live at <code>~/.claude/projects/&lt;slug&gt;/&lt;sessionId&gt;.jsonl</code>
				</div>
			</div>

			<input id="file-input" type="file" accept=".jsonl,application/jsonl,application/x-jsonlines" hidden />

			<div id="error" class="error-banner" hidden></div>

			<section id="messages" class="messages"></section>
		</main>

		<div class="drop-overlay" aria-hidden="true">
			<div class="drop-overlay-card">Release to load transcript</div>
		</div>

		<script type="module" src="./src/main.js"></script>
	</body>
</html>
